server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long-cache hashed build assets
    location /_app/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback (adapter-static fallback: 'index.html')
    location / {
        try_files $uri $uri/ /index.html;
    }
}
