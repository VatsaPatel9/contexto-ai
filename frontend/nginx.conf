server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ESM modules (.mjs) need an explicit JS content-type — nginx's default
    # mime.types doesn't include .mjs, so browsers refuse to import it as
    # a module. pdfjs-dist ships its worker as pdf.worker.min.mjs, so
    # without this the viewer fails with "Failed to fetch dynamically
    # imported module".
    location ~* \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Long-cache hashed build assets
    location /_app/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback (adapter-static fallback: 'index.html')
    location / {
        try_files $uri $uri/ /index.html;
    }
}
