server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Big enough for document uploads — chunked PDFs, .docx, etc.
    client_max_body_size 100m;

    # ESM modules (.mjs) need an explicit JS content-type — nginx's default
    # mime.types doesn't include .mjs, so browsers refuse to import it as
    # a module. pdfjs-dist ships its worker as pdf.worker.min.mjs, so
    # without this the viewer fails with "Failed to fetch dynamically
    # imported module".
    location ~* \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Long-cache hashed build assets
    location /_app/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy API and SuperTokens auth paths to the backend service.
    # Browsers see one origin (this nginx) so the SuperTokens session
    # cookie stays first-party — Safari and Chrome Incognito drop
    # third-party cookies, which would otherwise break sign-in. Set
    # ``BACKEND_URL`` on the Railway frontend service (e.g.
    # ``http://backend.railway.internal:8000``) to point at the backend.
    location /api/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE / streaming chat needs the connection to stay open.
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    location /auth/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback (adapter-static fallback: 'index.html')
    location / {
        try_files $uri $uri/ /index.html;
    }
}
