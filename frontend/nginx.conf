# Use the container's own DNS resolver (which Railway populates for
# its internal IPv6-based service discovery) and re-resolve every
# 10s. Without ``valid=...`` nginx caches the IP forever, so when a
# backend container restarts and gets a fresh internal address,
# every proxy hop returns 502 until the frontend is also restarted.
# ``ipv6=on`` is the default but stating it makes the IPv6-first
# Railway network behaviour explicit.
resolver 127.0.0.11 1.1.1.1 valid=10s ipv6=on;

server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Big enough for document uploads — chunked PDFs, .docx, etc.
    client_max_body_size 100m;

    # ESM modules (.mjs) need an explicit JS content-type — nginx's default
    # mime.types doesn't include .mjs, so browsers refuse to import it as
    # a module. pdfjs-dist ships its worker as pdf.worker.min.mjs, so
    # without this the viewer fails with "Failed to fetch dynamically
    # imported module".
    location ~* \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Long-cache hashed build assets
    location /_app/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy API and SuperTokens auth paths to the backend service.
    # Browsers see one origin (this nginx) so the SuperTokens session
    # cookie stays first-party — Safari and Chrome Incognito drop
    # third-party cookies, which would otherwise break sign-in.
    #
    # ``BACKEND_URL`` is set on the Railway frontend service. Either form
    # works, but internal is preferred (free egress, lower latency):
    #   internal:  http://<service>.railway.internal:<port>
    #   public:    https://<service>.up.railway.app
    #
    # We use a ``set $backend ...`` + variable in ``proxy_pass`` so nginx
    # re-resolves DNS each request — without that, a backend restart on
    # Railway leaves nginx pinned to a dead IP and every hop returns 502
    # until the frontend is restarted too.
    #
    # Two more things matter for HTTPS upstreams (the Railway public URL):
    # ``proxy_ssl_server_name`` enables SNI so Railway's edge serves the
    # right cert. We deliberately do NOT pass ``Host: $host`` upstream,
    # because that would send ``askcontexto.com`` to Railway's edge,
    # which routes by upstream Host header — wrong host = 502 / 404.
    # Letting nginx default to the upstream URL's host fixes that, and
    # we surface the original host via ``X-Forwarded-Host`` for the
    # backend to use when generating absolute URLs.
    location /api/ {
        # When a variable is used in proxy_pass, nginx no longer auto-
        # appends the request URI — we have to include it explicitly,
        # otherwise /api/parameters becomes /  at the backend.
        set $backend "${BACKEND_URL}";
        proxy_pass               $backend$request_uri;
        proxy_http_version       1.1;
        proxy_ssl_server_name    on;
        proxy_set_header         X-Real-IP         $remote_addr;
        proxy_set_header         X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header         X-Forwarded-Proto $scheme;
        proxy_set_header         X-Forwarded-Host  $host;
        # SSE / streaming chat needs the connection to stay open.
        proxy_buffering          off;
        proxy_read_timeout       300s;
    }

    # SvelteKit pages that share the /auth/ prefix with SuperTokens
    # API endpoints. ``^~`` makes nginx pick these over the proxy
    # block below — without it, the link in a verification or
    # password-reset email proxies to the backend (which has no
    # matching route) instead of opening the page that consumes the
    # token. See SuperTokens routes under /auth/user/... for the API
    # paths that still need to reach the backend.
    location ^~ /auth/verify-email {
        try_files $uri $uri/ /index.html;
    }
    location ^~ /auth/forgot-password {
        try_files $uri $uri/ /index.html;
    }
    location ^~ /auth/reset-password {
        try_files $uri $uri/ /index.html;
    }

    location /auth/ {
        # When a variable is used in proxy_pass, nginx no longer auto-
        # appends the request URI — we have to include it explicitly,
        # otherwise /api/parameters becomes /  at the backend.
        set $backend "${BACKEND_URL}";
        proxy_pass               $backend$request_uri;
        proxy_http_version       1.1;
        proxy_ssl_server_name    on;
        proxy_set_header         X-Real-IP         $remote_addr;
        proxy_set_header         X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header         X-Forwarded-Proto $scheme;
        proxy_set_header         X-Forwarded-Host  $host;
    }

    # SPA fallback (adapter-static fallback: 'index.html')
    location / {
        try_files $uri $uri/ /index.html;
    }
}
