# Railway config for the SvelteKit frontend service.
# In the Railway dashboard for this service set:
#   Root Directory     = /frontend
#   Config-as-code Path = /frontend/railway.toml
#
# Uses the frontend/Dockerfile (multi-stage: node build -> nginx serve).
# watchPatterns is resolved relative to the repo root.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.watchPatterns]
patterns = ["frontend/**"]
