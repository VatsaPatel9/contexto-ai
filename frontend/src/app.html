<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <title>Contexto - AI Tutor</title>
    %sveltekit.head%
    <script>
      // Theme initialization — runs before render to prevent FOUC (matches Open WebUI)
      (() => {
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (!localStorage.theme) {
          localStorage.theme = 'system';
        }

        const theme = localStorage.theme;

        if (theme === 'system') {
          document.documentElement.classList.add(prefersDark ? 'dark' : 'light');
          if (prefersDark) {
            document.documentElement.style.setProperty('--color-gray-800', '#333');
            document.documentElement.style.setProperty('--color-gray-850', '#262626');
            document.documentElement.style.setProperty('--color-gray-900', '#171717');
            document.documentElement.style.setProperty('--color-gray-950', '#0d0d0d');
          }
          metaThemeColor?.setAttribute('content', prefersDark ? '#171717' : '#ffffff');
        } else if (theme === 'oled-dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.style.setProperty('--color-gray-800', '#101010');
          document.documentElement.style.setProperty('--color-gray-850', '#050505');
          document.documentElement.style.setProperty('--color-gray-900', '#000000');
          document.documentElement.style.setProperty('--color-gray-950', '#000000');
          metaThemeColor?.setAttribute('content', '#000000');
        } else if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.style.setProperty('--color-gray-800', '#333');
          document.documentElement.style.setProperty('--color-gray-850', '#262626');
          document.documentElement.style.setProperty('--color-gray-900', '#171717');
          document.documentElement.style.setProperty('--color-gray-950', '#0d0d0d');
          metaThemeColor?.setAttribute('content', '#171717');
        } else {
          document.documentElement.classList.add('light');
          metaThemeColor?.setAttribute('content', '#ffffff');
        }
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
